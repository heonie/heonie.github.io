<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hello World</title>
    <style>
    svg {
    }
    g {
      stroke: black;
      stroke-width: 10px;
      fill: transparent;
      stroke-linecap: round;
    }
    .black g {
        stroke: white;
    }
    .black {
        background-color: black;
    }
    g.text {
    /*   animation: rotate 3000ms linear infinite; */
      transform-origin: center;
    }
    @keyframes rotate {
      0% {transform: rotateY(0)}
      50% {transform: rotateY(90deg)}
      50.1% {transform: rotateY(-90deg)}
      100% {transform: rotateY(0deg)}
    }
    </style>
  </head>
  <body>
    <svg width="400" height="400" id="logo-svg">
      <g class="text">
        <path d="M60 280, 60 120, 160 120, 260 280, C 330 280, 360 250, 360 200, 360 150, 330 120, 270 120"></path>
        <path d="M250 120 160 280"></path>
        <path d="M80 200 H 140"></path>
      </g>
      <g>
        <circle cx="200" cy="200" r="190"></circle>
      </g>
    </svg>
    <button onClick="toggleBW()">Toggle B/W</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vivus/0.4.5/vivus.min.js"></script>
    <script>
      new Vivus('logo-svg', {
        type: 'oneByOne',
        duration: 81
      }, function () {});
      function toggleBW() {
          var container = document.querySelector('body');
          if(container.className == "") {
            container.className = "black";
          }
          else {
            container.className = "";
          }
      }
    </script>
  </body>
</html>
